name: Regenerate Cargo lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Upgrade the patched XML parser
        working-directory: desktop/src-tauri
        run: cargo update -p plist --precise 1.10.0

      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add desktop/src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(deps): upgrade plist and quick-xml"
          git push origin HEAD:main
